meta:[
["判断軸","全停電シナリオに対する事前の備え・訓練の有無"],
["閾値","「地下変電所が停電するなんて想定していなかった」"],
["矛盾","「想定しているから、現地発電機」→ 部分的には想定していた"],
["問題","想定レベルが曖昧 → リスクアセスメントの深度不足"]
],
gaps:["リスクアセスメント記録の有無","全停電シナリオの訓練実績","発電機準備の根拠文書"]},
{id:"d5",label:"D-5. メーカー・機器固有の故障傾向知識が未体系化",tag:"org",
meta:[
["判断軸","「どのメーカーのどの機器がどう壊れやすいか」が組織知として蓄積されているか"],
["閾値","個人の暗黙知に偏在 → 形式知として共有されていない"],
["メモの表現","「どのメーカーのどの機器が、どういう不具合をおこしやすいのか？の背景知識 →」"],
["補足","製造年との相関も重要だが体系化されていない"]
]},
{id:"d6",label:"D-6. 部品供給の脆弱性",tag:"org",
meta:[
["判断軸","修理・交換に必要な部品が入手可能か"],
["閾値","「あれ日立つくってないぞ。どうしよう」→ 製造終了部品の存在"],
["対応","「撤去中の阿部変電所から部品をぱくる手配をしていた」→ 流用対応"],
["問題","計画的な部品管理・代替品確保の仕組みが未整備"]
],
gaps:["部品供給状況の体系的な管理記録","抵抗体等の重要部品の在庫・代替品情報"]}
]}
]};

const allGaps = [];

function collectGaps(n, path="") {
  const p = path ? path + " > " + n.label.replace(/\[.*?\]\s*/,"") : n.label;
  if(n.gaps) {
    n.gaps.forEach(g => allGaps.push({gap:g, path:p, id:n.id}));
  }
  if(n.children) n.children.forEach(c => collectGaps(c, p));
}
collectGaps(data);

function renderNode(n, depth){
  const div = document.createElement('div');
  div.className = 'node' + (depth < 2 ? ' expanded' : '');

  const hdr = document.createElement('div');
  hdr.className = 'node-header';

  const hasContent = (n.children && n.children.length > 0) || n.meta || n.gaps;

  const tog = document.createElement('span');
  tog.className = 'toggle';
  tog.textContent = hasContent ? '▶' : '·';
  hdr.appendChild(tog);

  const lbl = document.createElement('span');
  lbl.className = 'label';
  let labelHtml = n.label;
  if(n.tag){
    const tagLabels = {confirmed:'確認済',hypothesis:'仮説',rejected:'棄却',org:'組織的'};
    labelHtml += ' <span class="tag tag-'+n.tag+'">'+(tagLabels[n.tag]||n.tag)+'</span>';
  }
  lbl.innerHTML = labelHtml;
  hdr.appendChild(lbl);
  div.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'node-body';

  if(n.meta && n.meta.length > 0){
    const m = document.createElement('div');
    m.className = 'meta';
    n.meta.forEach(([k,v]) => {
      const r = document.createElement('div');
      r.className = 'meta-row';
      r.innerHTML = '<span class="meta-key">'+k+'</span><span class="meta-val">'+v+'</span>';
      m.appendChild(r);
    });
    body.appendChild(m);
  }

  if(n.gaps && n.gaps.length > 0){
    const g = document.createElement('div');
    g.className = 'gap-box';
    let html = '<strong>⚠ 情報不足ポイント</strong>';
    n.gaps.forEach(x => {
      html += '<div class="gap-item">' + x + '</div>';
    });
    g.innerHTML = html;
    body.appendChild(g);
  }

  if(n.children){
    n.children.forEach(c => {
      body.appendChild(renderNode(c, depth+1));
    });
  }

  div.appendChild(body);

  hdr.addEventListener('click', () => {
    if(hasContent) div.classList.toggle('expanded');
  });

  return div;
}

document.getElementById('tree-root').appendChild(renderNode(data, 0));

// Render gap summary
const priorities = [
  {ids:["a111a","a111b","a112","a113"], label:"最重要", cls:"priority-high", reason:"真因の確定に直結"},
  {ids:["b2","b3","a111c"], label:"重要", cls:"priority-mid", reason:"連鎖メカニズムの定量裏付け"},
  {ids:["c3","c4","c2"], label:"構造的", cls:"priority-mid", reason:"再発防止策の方向性決定"},
  {ids:["b1","d4","d6","a1h2","a1h3"], label:"補足的", cls:"priority-low", reason:"仮説検証・組織要因"}
];

const summaryEl = document.getElementById('gap-summary');
priorities.forEach(p => {
  const relevant = allGaps.filter(g => p.ids.includes(g.id));
  relevant.forEach(g => {
    const li = document.createElement('li');
    li.innerHTML = '<span class="priority-badge '+p.cls+'">'+p.label+'</span><span>'+g.gap+'</span>';
    summaryEl.appendChild(li);
  });
});
</script>
